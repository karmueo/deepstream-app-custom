# -----------------------------------------------------------------------------
# C-UAV 控制发送独立配置
# 风险说明：默认使用真实设备地址。若误改为其他设备地址并打开测试开关，会真实驱动云台和焦距。
# 回滚方式：恢复真实设备地址/端口，或将测试开关改回 0。
# -----------------------------------------------------------------------------
cuav-control:
  # 控制报文发送目标的组播 IP 地址。
  # 真实设备控制地址。
  # 设备接收控制报文：230.1.88.51:8003
  multicast-ip: 230.1.88.51
  # 如需隔离联调，可临时切换到其他测试组播地址。
  # 控制报文发送端口。
  # 真实设备控制端口：8003
  port: 8003
  # 如需隔离联调，可临时切换到其他测试端口。
  # 发送报文使用的网卡名称。
  # 多网卡环境下建议显式指定，避免报文从错误接口发出。
  interface: eno1
  # 组播 TTL（Time To Live）。
  # 值越大可跨越的路由跳数越多；局域网测试通常保持 1 即可。
  ttl: 1
  # 是否启用 0x7101 + cmd_id 兼容包装模式。
  # 0=使用当前默认协议格式，1=兼容旧设备/旧接收端。
  compat-cmd-wrapper: 0
  # 是否打印控制发送调试日志。
  # 开启后会输出每次发出的控制信息，便于联调但日志会明显增多。
  debug: 1
  # 是否打印上游 gst-udpjsonmeta 中转下来的状态报文。
  # 开启后便于确认设备反馈是否进入自动控制闭环。
  print-upstream-state: 1
  # pipeline 启动后是否立即发送固定测试报文。
  # 仅用于快速联通性验证；启用自动跟随或真实设备测试时通常建议关闭。
  send-test-on-startup: 0
  # 是否启用基于检测/跟踪结果的自动控制。
  # 0=不根据目标自动发控制，1=根据目标位置和大小自动发伺服与变焦控制。
  auto-track-enable: 1
  # 当前无目标时是否启用仿真目标。
  # 1 时即使没有真实检测目标，也会构造一个模拟目标继续驱动控制闭环。
  simulate-target-enable: 0
  # 自动控制使用的视频源 source_id。
  # 多路视频输入时，控制逻辑只会读取该路视频的检测/跟踪结果。
  control-source-id: 0
  # 自动控制最小发送周期，单位毫秒。
  # 值越小控制越频繁，但更容易造成云台/镜头抖动和日志增加。
  control-period-ms: 80
  # 目标丢失后的保持时间，单位毫秒。
  # 在该时间窗口内会保持最近一次锁定状态，超过后才清空自动控制状态。
  target-lost-hold-ms: 1000
  # 速度估计使用的历史样本数。
  # 值越大速度估计越平滑，但控制响应会更滞后。
  tracking-history-size: 5
  # 水平中心死区，归一化到 [-1, 1]。
  # 目标误差落在该范围内时，水平伺服不会主动修正。
  center-deadband-x: 0.01
  # 垂直中心死区，归一化到 [-1, 1]。
  # 目标误差落在该范围内时，垂直伺服不会主动修正。
  center-deadband-y: 0.01
  # 水平伺服位置误差比例增益。
  # 越大表示对目标水平偏差越敏感，过大可能导致摆动。
  servo-kp-x: 3
  # 垂直伺服位置误差比例增益。
  servo-kp-y: 3
  # 水平伺服速度前馈增益。
  # 目标移动较快时用于提前补偿。
  servo-kv-x: 0.35
  # 垂直伺服速度前馈增益。
  servo-kv-y: 0.35
  # 水平伺服方向。
  # 1 表示目标向右偏时按正方向修正，-1 表示方向相反。
  servo-dir-x: 1
  # 垂直伺服方向。
  # 当前值 -1 表示目标向下偏时按负方向修正，常用于俯仰方向与图像坐标相反的设备。
  servo-dir-y: -1
  # 单次水平伺服位置最大调整量，单位度。
  # 用于限制单次动作幅度，防止大步长造成冲击。
  servo-max-step-h: 3
  # 单次垂直伺服位置最大调整量，单位度。
  servo-max-step-v: 2
  # 是否按可见光焦距自适应降低伺服灵敏度。
  # 焦距越大视场角越小，开启后会自动减小单次伺服步长和速度，降低目标被甩出画面的概率。
  servo-focal-adaptive-enable: 1
  # 最大焦距时的伺服步长缩放下限。
  # 0.25 表示焦距接近 pt-focal-max 时，servo-max-step-h/v 最多缩到原来的 25%。
  servo-focal-max-step-scale-min: 0.15
  # 最大焦距时的伺服速度缩放下限。
  # 0.50 表示焦距接近 pt-focal-max 时，伺服速度增量最多缩到原来的 50%。
  servo-focal-speed-scale-min: 0.30
  # 伺服控制允许使用的最小速度。
  servo-min-speed: 10
  # 伺服控制允许使用的最大速度。
  servo-max-speed: 100
  # 自动变焦目标区间下限。
  # 目标框高度占画面高度低于该值时，会尝试放大。
  zoom-target-ratio-min: 0.015
  # 自动变焦目标区间上限。
  # 目标框高度占画面高度高于该值时，会尝试缩小。
  zoom-target-ratio-max: 0.03
  # 变焦死区。
  # 在目标占比接近上下限时留出缓冲，减少镜头来回抽动。
  zoom-deadband: 0.001
  # 变焦比例增益。
  # 占比误差会按该系数转换为焦距调整量。
  zoom-kp: 2500.0
  # 单次焦距最大调整量。
  # 用于限制一次变焦命令的变化幅度。
  zoom-max-step: 400.0
  # 自动可见光变焦命令保持时间，单位毫秒。
  # 发送 pt_focal_en 后，超过该时间会强制补发 pt_focal_en=0 停止连续变焦。
  visible-focal-hold-ms: 200
  # 是否发送可见光控制报文。
  # 1 时自动控制/测试链路会发送 0x7205；0 时不发送可见光控制。
  visible-light-control-enable: 1
  # 是否发送红外控制报文。
  # 1 时自动控制/测试链路会发送 0x7206；若与可见光同时为 1，则两路都会发送。
  infrared-control-enable: 0
  # 伺服控制报文中的 dev_id。
  # 0=只选可见光，1=只选热成像，2=同时控制可见光和热成像。
  servo-dev-id: 2
  # 可见光镜头允许使用的最小焦距。
  # 到达该值后不会继续缩小。
  pt-focal-min: 134.0
  # 可见光镜头允许使用的最大焦距。
  # 到达该值后不会继续放大。
  pt-focal-max: 16298.0
  # 红外自动变焦比例增益。
  # 红外焦距范围远小于可见光，建议单独调参，不要直接复用 zoom-kp。
  ir-zoom-kp: 80.0
  # 红外单次焦距最大调整量。
  # 用于限制一次红外变焦命令的变化幅度。
  ir-zoom-max-step: 40.0
  # 红外镜头允许使用的最小焦距。
  # 默认按协议范围设置，设备有差异时可再调整。
  ir-focal-min: 851.0
  # 红外镜头允许使用的最大焦距。
  # 默认按协议范围设置，设备有差异时可再调整。
  ir-focal-max: 1223.0
  # 红外默认聚焦值。
  # 当没有新鲜红外反馈时，会回退到该值；协议默认值为 5。
  ir-focus-default: 5
  # 仿真目标水平摆动幅度，归一化到画面中心坐标系。
  # 仅在 simulate-target-enable=1 时生效。
  simulate-target-amplitude-x: 0.35
  # 仿真目标垂直摆动幅度，归一化到画面中心坐标系。
  simulate-target-amplitude-y: 0.20
  # 仿真目标最小高度占比。
  # 用于模拟远距离目标时的大小变化。
  simulate-target-ratio-min: 0.18
  # 仿真目标最大高度占比。
  # 用于模拟近距离目标时的大小变化。
  simulate-target-ratio-max: 0.36
  # 仿真目标完整运动周期，单位毫秒。
  simulate-target-period-ms: 6000
  # 判定水平伺服动作“确实生效”的最小变化阈值，单位度。
  servo-effect-threshold-h: 0.5
  # 判定垂直伺服动作“确实生效”的最小变化阈值，单位度。
  servo-effect-threshold-v: 0.3
  # 判定变焦动作“确实生效”的最小焦距变化阈值。
  focal-effect-threshold: 50.0
  # 判定红外变焦动作“确实生效”的最小焦距变化阈值。
  # 红外焦距范围较小，阈值通常要低于可见光。
  ir-focal-effect-threshold: 10.0
  # 设备状态报文的新鲜度超时，单位毫秒。
  # 超过该时间未收到新状态时，会认为反馈过期。
  state-stale-timeout-ms: 2000
  # 是否启用“四角伺服 + 拉近/拉远焦距”循环序列。
  # 0=关闭，1=开启。
  # 开启后会优先于 auto-track。
  corner-zoom-cycle-enable: 0
  # 单轮四角循环次数。
  corner-cycle-count: 1
  # 整套“四角 + 变焦”流程重复次数。
  sequence-repeat-count: 1
  # 四角相对当前中心位置的水平偏移量，单位度。
  corner-offset-h-deg: 15.0
  # 四角相对当前中心位置的垂直偏移量，单位度。
  corner-offset-v-deg: 10.0
  # 每个角点停留时间，单位毫秒。
  corner-dwell-ms: 1000
  # 四角循环使用的伺服速度。
  corner-servo-speed: 30
  # 拉进焦距持续时间，单位毫秒。
  zoom-in-duration-ms: 1000
  # 拉远焦距持续时间，单位毫秒。
  zoom-out-duration-ms: 1000
  # 可选：程序启动和每轮回位的初始伺服位置；不配置则默认使用首个有效反馈位置。
  corner-home-loc-h-deg: 54.0
  corner-home-loc-v-deg: 4.0
  # 可选：程序启动时先下发 pt_focal_en=4，把可见光焦距调到最小；随后按保持时间再下发 pt_focal_en=0 停止。
  # 0=关闭，1=开启。
  startup-pt-focal-min-enable: 1
  # 上述最小焦距命令保持时间，单位毫秒。
  # 默认 3000，即 3 秒。
  startup-pt-focal-min-hold-ms: 10000
  # 可选：程序启动和每轮回位时的可见光聚焦预置位；不配置则不下发 pt_focus 预置报文。
  # corner-home-pt-focus: 100
  # 公共报文头中的发送方系统 ID。
  tx-sys-id: 999
  # 公共报文头中的发送方设备类型。
  tx-dev-type: 1
  # 公共报文头中的发送方设备 ID。
  tx-dev-id: 999
  # 公共报文头中的发送方子设备 ID。
  tx-subdev-id: 999
  # 公共报文头中的接收方系统 ID。
  rx-sys-id: 999
  # 公共报文头中的接收方设备类型。
  rx-dev-type: 1
  # 公共报文头中的接收方设备 ID。
  rx-dev-id: 999
  # 公共报文头中的接收方子设备 ID。
  rx-subdev-id: 999
